<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>미성년자 판별</h1>
    <input id="input_age" type="number" value="17" />
    <button id="button_onclick">확인</button>
    <div id="result">성인일까요? 미성년자일까요?</div>
</body>
<script>
    // 1. 버튼 클릭시 이벤트 실행
    document.getElementById("button_onclick").onclick = function ()
    {
        // 1-1. #input_age의 value 조회
        let age = document.getElementById("input_age").value;
        let result = null;
        // 1-2. 해당 나이 나편
        if (age >= 20)
        {
            result = "성인"
        }
        else
        {
            result = "미성년자"
        }
        document.getElementById("result").textContent = result + "입니다"
        // 1-3. 판별 결과를 #result에 준다.
    }
</script>
</html>
